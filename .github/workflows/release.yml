name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libasound2-dev protobuf-compiler

      - run: pnpm install --frozen-lockfile

      - name: Build MCP image-gen server
        run: |
          cargo build --release --manifest-path mcp-image-gen/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          cp target/release/mcp-image-gen src-tauri/binaries/mcp-image-gen-${TRIPLE}

      - run: pnpm tauri build

      - name: Collect Linux bundles
        run: |
          mkdir -p release-assets
          cp target/release/bundle/deb/*.deb release-assets/ 2>/dev/null || true
          cp target/release/bundle/rpm/*.rpm release-assets/ 2>/dev/null || true
          cp target/release/bundle/appimage/*.AppImage release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: release-assets/*

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: brew install protobuf

      - run: pnpm install --frozen-lockfile

      - name: Build MCP image-gen server
        run: |
          cargo build --release --manifest-path mcp-image-gen/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          cp target/release/mcp-image-gen src-tauri/binaries/mcp-image-gen-${TRIPLE}

      - run: pnpm tauri build

      - name: Collect macOS bundles
        run: |
          mkdir -p release-assets
          cp target/release/bundle/dmg/*.dmg release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          path: release-assets/*

  publish:
    name: Publish Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
