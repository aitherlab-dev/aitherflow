name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libasound2-dev

      - run: pnpm install --frozen-lockfile

      - run: pnpm tauri build

      - name: Collect Linux bundles
        run: |
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/deb/*.deb release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/rpm/*.rpm release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: release-assets/*

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - run: pnpm tauri build

      - name: Create DMG from .app
        run: |
          mkdir -p release-assets
          echo "=== Bundle contents ==="
          ls -laR src-tauri/target/release/bundle/ | head -50
          echo "=== Looking for .app ==="
          find src-tauri/target/release/bundle -maxdepth 3 -name "*.app" 2>/dev/null || true
          APP_PATH=$(find src-tauri/target/release/bundle -maxdepth 3 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found, listing all bundle types:"
            ls -la src-tauri/target/release/bundle/
            exit 1
          fi
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: "//;s/".*//')
          ARCH=$(uname -m)
          DMG_NAME="aitherflow_${VERSION}_${ARCH}.dmg"
          hdiutil create -volname "aitherflow" -srcfolder "$APP_PATH" -ov -format UDZO "release-assets/$DMG_NAME"
          ls -la release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          path: release-assets/*

  publish:
    name: Publish Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
